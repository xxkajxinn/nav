<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的导航页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 800px;
            max-width: 100%;
            backdrop-filter: blur(10px);
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-weight: 300;
            font-size: 28px;
            text-align: center;
        }
        .sub {
            color: #888;
            margin-bottom: 25px;
            font-size: 14px;
            text-align: center;
        }
        .search-box {
            display: flex;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 50px;
            overflow: hidden;
            margin-bottom: 30px;
            transition: 0.3s;
        }
        .search-box:hover {
            border-color: #667eea;
        }
        .search-box input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            outline: none;
            font-size: 16px;
            min-width: 0;
        }
        .search-box select {
            padding: 14px 10px;
            border: none;
            background: #f8f9fa;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            border-left: 1px solid #eee;
        }
        .search-box button {
            padding: 14px 30px;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
            white-space: nowrap;
        }
        .search-box button:hover {
            background: #5a67d8;
        }
        .tag {
            margin: 20px 0 10px 0;
            font-weight: bold;
            color: #555;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
            font-size: 16px;
        }
        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-start;
            margin-top: 10px;
        }
        .links a {
            display: inline-block;
            padding: 8px 20px;
            background: #eef2f7;
            color: #333;
            text-decoration: none;
            border-radius: 30px;
            font-size: 14px;
            transition: 0.2s;
        }
        .links a:hover {
            background: #667eea;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #aaa;
            text-align: center;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            .search-box {
                flex-wrap: wrap;
                border-radius: 16px;
            }
            .search-box input {
                width: 100%;
                border-radius: 16px 16px 0 0;
            }
            .search-box select {
                flex: 1;
                border-radius: 0;
                border-left: none;
                border-top: 1px solid #eee;
            }
            .search-box button {
                flex: 1;
                border-radius: 0 0 16px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 我的万能导航</h1>
        <p class="sub">点击搜索框右边的下拉菜单切换搜索引擎</p>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入你想搜的内容..." onkeydown="if(event.key==='Enter') doSearch()" />
            <select id="engineSelect">
                <option value="https://www.baidu.com/s?wd=">百度</option>
                <option value="https://www.bing.com/search?q=">必应</option>
                <option value="https://www.google.com/search?q=">谷歌</option>
            </select>
            <button onclick="doSearch()">搜一下</button>
        </div>

        <div class="tag">📚 学习</div>
        <div class="links">
            <a href="https://www.zhihu.com" target="_blank">知乎</a>
            <a href="https://www.cnki.net" target="_blank">知网</a>
            <a href="https://read.douban.com" target="_blank">豆瓣阅读</a>
            <a href="https://scholar.google.com" target="_blank">Google学术</a>
        </div>

        <div class="tag">🎬 视频</div>
        <div class="links">
            <a href="https://www.bilibili.com" target="_blank">B站</a>
            <a href="https://www.douyin.com" target="_blank">抖音</a>
            <a href="https://www.youtube.com" target="_blank">YouTube</a>
            <a href="https://www.iqiyi.com" target="_blank">爱奇艺</a>
        </div>

        <div class="tag">🔧 工具</div>
        <div class="links">
            <a href="https://fanyi.baidu.com" target="_blank">百度翻译</a>
            <a href="https://mail.qq.com" target="_blank">QQ邮箱</a>
            <a href="https://maps.google.com" target="_blank">谷歌地图</a>
            <a href="https://github.com" target="_blank">GitHub</a>
        </div>

        <div class="tag">📡 其他</div>
        <div class="links">
            <a href="https://www.weibo.com" target="_blank">微博</a>
            <a href="https://www.douban.com" target="_blank">豆瓣</a>
            <a href="https://www.163.com" target="_blank">网易</a>
        </div>

        <div class="footer">
            💡 这是你自己做的导航页！<br />
            想加网站？编辑这个文件，复制 <code>&lt;a href="网址" target="_blank"&gt;名字&lt;/a&gt;</code> 粘进去就行。
        </div>
    </div>

    <script>
        function doSearch() {
            var input = document.getElementById('searchInput').value;
            var engine = document.getElementById('engineSelect').value;
            if (input.trim() === '') {
                alert('请输入搜索内容呀！');
                return;
            }
            window.open(engine + encodeURIComponent(input), '_blank');
        }
    </script>
</body>
</html>
