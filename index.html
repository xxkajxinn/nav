<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的导航站</title>
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: #1a1a2e;
            background-image: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        /* 毛玻璃遮罩层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 36px 40px 44px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s;
        }

        /* ===== 顶部标题 ===== */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }

        .header h1 i {
            color: #ffb7c5;
            margin-right: 10px;
        }

        .header .sub {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 6px;
            letter-spacing: 4px;
        }

        /* ===== 搜索框 ===== */
        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 60px;
            padding: 6px 6px 6px 24px;
            margin-bottom: 40px;
            transition: 0.3s;
            backdrop-filter: blur(4px);
        }

        .search-box:focus-within {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.35);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        .search-box i {
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
            margin-right: 12px;
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 16px;
            padding: 14px 0;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .search-box select {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            outline: none;
            color: #fff;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            appearance: none;
            -webkit-appearance: none;
        }

        .search-box select option {
            background: #2d2d44;
            color: #fff;
        }

        .search-box button {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
            backdrop-filter: blur(4px);
            margin-left: 4px;
            white-space: nowrap;
        }

        .search-box button:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.02);
        }

        /* ===== 分类卡片区域 ===== */
        .section {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
        }

        .section-title i {
            font-size: 20px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }

        .card-item {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 16px 10px;
            text-align: center;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.85);
            transition: 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .card-item:hover {
            background: rgba(255, 255, 255, 0.14);
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2);
        }

        .card-item .icon {
            font-size: 28px;
            line-height: 1.2;
        }

        .card-item .name {
            font-size: 13px;
            font-weight: 500;
            line-height: 1.3;
        }

        .card-item .desc {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            display: none;
        }

        /* ===== 页脚 ===== */
        .footer {
            margin-top: 30px;
            text-align: center;
            color: rgba(255, 255, 255, 0.25);
            font-size: 12px;
            letter-spacing: 2px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .container {
                padding: 20px 18px 28px;
                border-radius: 24px;
            }

            .header h1 {
                font-size: 24px;
            }

            .search-box {
                flex-wrap: wrap;
                padding: 8px 8px 8px 18px;
                border-radius: 30px;
            }

            .search-box input {
                width: 100%;
                padding: 12px 0;
                font-size: 15px;
            }

            .search-box select {
                flex: 1;
                padding: 8px 12px;
                font-size: 13px;
                border-radius: 20px;
                margin: 4px 0;
            }

            .search-box button {
                flex: 1;
                padding: 10px 16px;
                font-size: 14px;
                justify-content: center;
                margin-left: 0;
            }

            .card-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 10px;
            }

            .card-item {
                padding: 14px 6px;
            }

            .card-item .icon {
                font-size: 22px;
            }

            .card-item .name {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1><i class="fas fa-compass"></i> 我的导航站</h1>
            <p class="sub">✨ 在互联网角落里安安静静的小站 ✨</p>
        </div>

        <!-- 搜索框 -->
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="搜索你想要的..." onkeydown="if(event.key==='Enter') doSearch()" />
            <select id="engineSelect">
                <option value="https://www.google.com/search?q=">Google</option>
                <option value="https://www.baidu.com/s?wd=">百度</option>
                <option value="https://www.bing.com/search?q=">必应</option>
            </select>
            <button onclick="doSearch()"><i class="fas fa-arrow-right"></i></button>
        </div>

        <!-- ===== 分类卡片 ===== -->

        <div class="section">
            <div class="section-title"><i class="fas fa-tools"></i> 实用工具</div>
            <div class="card-grid">
                <a href="https://github.com" target="_blank" class="card-item">
                    <span class="icon">🐙</span>
                    <span class="name">GitHub</span>
                </a>
                <a href="https://chatgpt.com" target="_blank" class="card-item">
                    <span class="icon">🤖</span>
                    <span class="name">ChatGPT</span>
                </a>
                <a href="https://deepseek.com" target="_blank" class="card-item">
                    <span class="icon">🐋</span>
                    <span class="name">DeepSeek</span>
                </a>
                <a href="https://gemini.google.com" target="_blank" class="card-item">
                    <span class="icon">✨</span>
                    <span class="name">Gemini</span>
                </a>
                <a href="https://www.deepl.com/translator" target="_blank" class="card-item">
                    <span class="icon">🌐</span>
                    <span class="name">DeepL</span>
                </a>
                <a href="https://www.remove.bg" target="_blank" class="card-item">
                    <span class="icon">🖼️</span>
                    <span class="name">Remove.bg</span>
                </a>
                <a href="https://www.pexels.com" target="_blank" class="card-item">
                    <span class="icon">📸</span>
                    <span class="name">Pexels</span>
                </a>
            </div>
        </div>

        <div class="section">
            <div class="section-title"><i class="fas fa-brain"></i> AI 工具</div>
            <div class="card-grid">
                <a href="https://chatgpt.com" target="_blank" class="card-item">
                    <span class="icon">🤖</span>
                    <span class="name">ChatGPT</span>
                </a>
                <a href="https://claude.ai" target="_blank" class="card-item">
                    <span class="icon">🧩</span>
                    <span class="name">Claude</span>
                </a>
                <a href="https://deepseek.com" target="_blank" class="card-item">
                    <span class="icon">🐋</span>
                    <span class="name">DeepSeek</span>
                </a>
                <a href="https://gemini.google.com" target="_blank" class="card-item">
                    <span class="icon">⭐</span>
                    <span class="name">Gemini</span>
                </a>
                <a href="https://www.perplexity.ai" target="_blank" class="card-item">
                    <span class="icon">🌊</span>
                    <span class="name">Perplexity</span>
                </a>
            </div>
        </div>

        <div class="section">
            <div class="section-title"><i class="fas fa-globe"></i> 趣味网站</div>
            <div class="card-grid">
                <a href="https://www.eev3.com/mp3/mcknwkhhn.html" target="_blank" class="card-item">
                    <span class="icon">📻</span>
                    <span class="name">Radio Garden</span>
                </a>
                <a href="https://www.bilibili.com/" target="_blank" class="card-item">
                    <span class="icon">📟</span>
                    <span class="name">FlightRadar24</span>
                </a>
                <a href="https://www.earthcam.com" target="_blank" class="card-item">
                    <span class="icon">🌍</span>
                    <span class="name">EarthCam</span>
                </a>
                <a href="https://www.worldguessr.com" target="_blank" class="card-item">
                    <span class="icon">🗺️</span>
                    <span class="name">WorldGuessr</span>
                </a>
                <a href="https://theuselessweb.com" target="_blank" class="card-item">
                    <span class="icon">🎲</span>
                    <span class="name">The Useless Web</span>
                </a>
            </div>
        </div>

        <!-- 页脚 -->
        <div class="footer">
            <i class="fas fa-heart" style="color: rgba(255, 180, 200, 0.4);"></i> 在互联网角落里安静地吃灰中
        </div>
    </div>

    <script>
        function doSearch() {
            const input = document.getElementById('searchInput').value.trim();
            const engine = document.getElementById('engineSelect').value;
            if (!input) {
                alert('请输入搜索内容呀！');
                return;
            }
            window.open(engine + encodeURIComponent(input), '_blank');
        }
    </script>
</body>
</html>
